name = "ernisto/git"
version = "0.1.0-alpha.9"
description = "library for reading git objects (heavy wip)"
authors = ["ernisto <joaovitordesouza707@gmail.com>"]
repository = "https://github.com/ernisto/git"
license = "MIT"

includes = [
    "utils/**/*.luau",
    "lib/**/*.luau",
    "pesde.toml",
    "README.md",
    "LICENSE",
    ".luaurc",
]

[target]
environment = "lune"
lib = "lib/init.luau"

[engines]
pesde = "^0.7.0"
lune = "^0.10.4"

[indices]
default = "https://github.com/pesde-pkg/index"
